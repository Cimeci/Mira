<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>@sample_profile — galerie</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: #0b0f14; color: #e6edf3;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    .topbar {
      display: flex; align-items: center; gap: 10px; justify-content: center;
      background: #10161f; border-bottom: 1px solid #1c2530;
      font-size: .82rem; color: #7d8590; padding: 8px 16px;
    }
    .topbar .live { width: 8px; height: 8px; border-radius: 50%; background: #34d399; box-shadow: 0 0 8px #34d399; }
    .topbar b { color: #e6edf3; }
    .banner { height: 180px; background: linear-gradient(120deg, #0f2942, #1e1b4b 60%, #3b0d1f); }
    .head { max-width: 960px; margin: -56px auto 0; padding: 0 20px; display: flex; gap: 18px; align-items: flex-end; }
    .avatar {
      width: 112px; height: 112px; border-radius: 50%; border: 4px solid #0b0f14;
      background: conic-gradient(from 210deg, #2dd4bf, #a78bfa, #fb7185, #2dd4bf);
    }
    .meta h1 { margin: 0; font-size: 1.35rem; }
    .meta .handle { color: #7d8590; font-size: .95rem; }
    .meta .bio { color: #adbac7; font-size: .9rem; margin-top: 6px; max-width: 520px; }
    .counts { max-width: 960px; margin: 16px auto 0; padding: 0 20px; color: #7d8590; font-size: .85rem; display: flex; gap: 20px; }
    .counts b { color: #e6edf3; }
    .grid {
      max-width: 960px; margin: 24px auto 60px; padding: 0 20px;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }
    .grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; display: block; }
    @media (max-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="topbar"><span class="live"></span> connecté en tant que <b>@sample_profile</b> · zone réservée aux membres</div>
  <div class="banner"></div>
  <header class="head">
    <div class="avatar"></div>
    <div class="meta">
      <h1>Sample Profile</h1>
      <div class="handle">@sample_profile · mock host de démonstration</div>
      <div class="bio">Compte factice servi en local pour tester le locator Mira. Aucune donnée réelle — toutes les images sont des placeholders générés.</div>
    </div>
  </header>
  <div class="counts"><span><b>12</b> médias</span><span><b>1 240</b> abonnés</span><span><b>318</b> abonnements</span></div>
  <main class="grid">
    <img src="images/img-01.svg" alt="échantillon 01" />
    <img src="images/img-02.svg" alt="échantillon 02" />
    <img src="images/img-03.svg" alt="échantillon 03" />
    <img src="images/img-04.svg" alt="échantillon 04" />
    <img src="images/img-05.svg" alt="échantillon 05" />
    <img src="images/img-06.svg" alt="échantillon 06" />
    <img src="images/img-07.svg" alt="échantillon 07" />
    <img src="images/img-08.svg" alt="échantillon 08" />
    <img src="images/img-09.svg" alt="échantillon 09" />
    <img src="images/img-10.svg" alt="échantillon 10" />
    <img src="images/img-11.svg" alt="échantillon 11" />
    <img src="images/img-12.svg" alt="échantillon 12" />
  </main>
</body>
</html>
