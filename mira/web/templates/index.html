<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mira — Locator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="stage">
    <header class="brand">
      <div class="mark">MIRA</div>
      <p class="tagline">Locator · balayage d'images piloté agent</p>
    </header>

    <form class="commandform" method="get" action="/live">
      <div class="commandbar">
        <span class="prompt">▸</span>
        <input
          class="url-input"
          type="text"
          name="url"
          value="{{ default_url }}"
          spellcheck="false"
          autocomplete="off"
          autofocus
          aria-label="URL à analyser"
        />
        <button class="scan" type="submit">Scanner</button>
      </div>

      <fieldset class="engine">
        <legend>moteur de navigation</legend>
        <label class="eng-opt">
          <input type="radio" name="driver" value="playwright" checked />
          <span class="eng-name">Déterministe</span>
          <span class="eng-sub">script Playwright · rapide, fiable</span>
        </label>
        <label class="eng-opt">
          <input type="radio" name="driver" value="gemini-cu" />
          <span class="eng-name">Computer Use</span>
          <span class="eng-sub">Gemini pilote · l'agent décide · ~30-50&nbsp;s</span>
        </label>
      </fieldset>
    </form>

    <p class="hint">
      L'agent ouvre l'URL, franchit un éventuel login, scrolle, puis collecte les images.
      <br />Cible préremplie : le <strong>mock host</strong> de démo — <a href="/mockhost/" target="_blank" rel="noreferrer">le voir</a>.
    </p>
  </main>
</body>
</html>
