<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mira — Locator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="stage">
    <header class="brand">
      <div class="mark">MIRA</div>
      <p class="tagline">Locator · balayage d'images piloté agent</p>
    </header>

    <form class="commandform" method="get" action="/live">
      <div class="commandbar">
        <span class="prompt">▸</span>
        <input
          class="url-input"
          type="text"
          name="url"
          value="{{ default_url }}"
          spellcheck="false"
          autocomplete="off"
          autofocus
          aria-label="URL à analyser"
        />
        <button class="scan" type="submit">Scanner</button>
      </div>
    </form>

    <p class="hint">
      <strong>Gemini Computer Use</strong> ouvre l'URL, franchit un éventuel login, scrolle,
      puis collecte les images — l'agent décide de chaque geste (~30-50&nbsp;s).
      <br />Cible préremplie : le <strong>mock host</strong> de démo — <a href="/mockhost/" target="_blank" rel="noreferrer">le voir</a>.
    </p>

    <div class="mode">
      <span class="dot"></span> moteur : <strong>Gemini Computer Use</strong> — navigation 100% agentique
    </div>
  </main>
</body>
</html>
